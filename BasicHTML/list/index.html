<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
  </head>
  <body>
    <ol>
      <li>Students</li>
      <ol type="i">
        <!-- ol controls the indentation not li that's why we donot face any indentation error-->
        <li>Pihu</li>
        <li>Kavu</li>
        <li>Raju</li>
        <li>Kalu</li>
        <li>Mahi</li>
        <li>Johu</li>
      </ol>
      <!-- </li> -->
    </ol>
    <hr />
    <ul>
      <li>Pihu</li>
      <li>Kavu</li>
      <li>Raju</li>
      <li>Kalu</li>
      <li>Mahi</li>
      <li>Johu</li>
    </ul>
    <hr />
    <ol type="a" reversed>
      <!--- reversed , start --->
      <li>Pihu</li>
      <li>Kavu</li>
      <li>Raju</li>
      <li>Kalu</li>
      <li>Mahi</li>
      <li>Johu</li>
    </ol>
  </body>
</html>
