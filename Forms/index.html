<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- label and input => visible output =>  connect label with input using for and id -->
    <form>
      <label for="Name">Enter Your name: </label>
      <!-- Value aur name se hi backend tak data pahuchta hai  -->
      <input type="text" id="Name" name="Name" />
      <input type="file" />
      <select name="ABC" id="ABC">
        <!--- option and Optgroup --->
        <option value="">Select an Option</option>
        <option value="saz">saz</option>
        <option value="nax">nax</option>
        <option value="toe">toe</option>
        <option value="pih">pih</option>
      </select>
      <input type="submit" />

      <button>submit kro bro</button>
      <input type="file" multiple accept="image/*" />
    </form>

    <p align="center">
      Lorem ipsum 
    </p>
  </body>
</html>
