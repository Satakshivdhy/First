<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <div>
      <form>
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname" />
        <label for="lname">Last Name:</label>
        <input type="text" name="lname" id="lname" />
        <br /><br />
        <label for="dob">Date of birth:</label>
        <input type="date" name="DOB" id="dob" />
        <label for="age">Age:</label>
        <input type="number" name="Age" id="age" />
        <br /><br />
        <label for="gender">Gender:</label>
        <select name="gender" id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <label for="emai">Email Address:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter email address"
        />
        <br><br>
        <label for="positons">Positions Available</label>
        <input type="radio" name="position">Junior Developer
        <input type="radio" name="position">Mid-level Developer
        <input type="radio" name="position">Senior Developer
        <br><br>
        <label">Programming Languages:</label>
        <input type="checkbox" >Java
        <input type="checkbox" >JavaScript
        <input type="checkbox" >Python
        <br><br>
        <label for="password">Password:</label>
        <input type="password" name="pass" id="password">
        <label for="confirmPassword"> Confirm Password:</label>
        <input type="password" id="confirmPassword">
        <br><br>
        <div>
            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
        </div>
      </form>
    </div>
</body>
</html>
