<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Register Page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css"
    />
  </head>
  <body>
    <div id="mainDiv">
      <div id="container">
        <div id="login">
          <div class="cards" id="login_title">
            <h1><b><span class="blue_line">Lo</span>gin </b> </h1>
             <!-- <h1>Login</h1>
            <div id="blue_line"></div> -->
          </div>

          <div class="cards" id="email">
            <i class="ri-mail-line"></i>
            <input type="email" placeholder="Enter your Email" />
            <!-- <div id="line"></div> -->
          </div>
          <div class="cards" id="pass">
            <div><i class="ri-lock-line"></i>
            <input type="password" placeholder="Confirm a password" /></div>
            <i class="ri-eye-line"></i>
          </div>
          <div class="cards" id="password">
            <div>
            <input type="checkbox"> Remember me</div>
            <b><a href="">Forgot password?</a></b>
          </div>

          <button type="submit" id="loginButton">Login now</button>
          <div class="cards" id="signup">
            <p>Don't have an account? <a href=" "><b> Signup Now</b> </a></p>
          </div>
        </div>
        <div id="register">

             <div class="cards2" id="login_title">
            <!-- <h1><b><span><u>Lo</u></span>gin </b> </h1> -->
            <h1><b><span class="blue_line">Re</span>gistration </b> </h1>

             
          </div>

          <div class="cards2" id="email">
            <i class="ri-user-3-line"></i>
            <input type="text" placeholder="Enter your Name" />
            <!-- <div id="line"></div> -->
          </div>

          <div class="cards2" id="email">
            <i class="ri-mail-line"></i>
            <input type="email" placeholder="Enter your Email" />
            <!-- <div id="line"></div> -->
          </div>
          <div class="cards2" id="pass">
            <div><i class="ri-lock-line"></i>
            <input type="password" placeholder="Create a password" /></div>
            <!-- <i class="ri-eye-line"></i> -->
          </div>
          <div class="cards2" id="pass">
            <div><i class="ri-lock-line"></i>
            <input type="password" placeholder="Confirm a password" /></div>
            <i class="ri-eye-line"></i>
          </div>
          <div class="cards2" id="password">
            <div>
            <input type="checkbox">I accept all terms & Conditions</div>
            <!-- <b><a href="">Forgot password?</a></b> -->
          </div>

          <button type="submit" id="registerButton">Register Now</button>
          <div class="cards2" id="signup">
            <p>Already have an account? <a href=" "><b> Login Now</b> </a></p>
          </div>

            
        </div>
          
          <i class="ri-mail-line"></i>
          <img src="" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
