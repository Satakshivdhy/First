<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container" class="border rounded shadow bg-light">
      <h1 class="fw-bold text-center">Elictricity Bill Calculator</h1>
      <form class="d-flex flex-column gap-3 w-75 p-3">
        <label for="electricityUnits" class="fw-bold fs-5"
          >Enter the elictricity units:</label
        >
        <input
          type="number"
          id="electricityUnits"
          name="electricityUnits"
          class="w-100 form-control"
        />
        <div>
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-danger">Clear</button>
        </div>
      </form>
      <div class="fw-semibold p-3">
        <p>Total units used this month <span id="unitsUsed">0.0</span></p>
        <p>Sub-Total: <span id="subTotal">0.0</span> Rs.</p>
        <p>SurCharge Amount: <span id="surCharge">0.0</span> Rs.</p>
        <p>Total Electricity Bill: <span id="TotalBill">0.0</span> Rs.</p>
      </div>
    </div>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
