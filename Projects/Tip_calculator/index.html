<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body>
    <div class=" w-25 bg-light  mt-5 mx-auto border rounded shadow p-4">
      <h1>TIP CALCULATOR</h1>
      <form class="d-flex flex-column p-3 gap-3">
        <label for="billAmount">Bill Amount</label>
        <div class="d-flex ">
        <input type="number" name="billAmount" id="billAmount" placeholder="Amount to be paid" class="form-control" >
            <p>₹</p>
    </div>
        <label for="review">How was the service?</label>
        <select name="review" id="review" class="form-control">
            <option value="select">Select</option>
            <option value="25">25% - Top Notch</option>
            <option value="20">20% - Excellent</option>
            <option value="15">15% - Good</option>
            <option value="10">10% - Bad</option>
            <option value="5">5% - Worst</option>
        </select>

        <label for="persons">Total number of persons</label>
        <input type="number" id="persons" name="persons" placeholder="Number of people sharing the bill" class="form-control">

        <button type="submit" class="btn btn-primary">Calculate</button>
      </form>
      <div class="d-flex flex-column justify-content-center align-items-center">
        Tip Amount:
        <br>
        <span id="TipPerHead"></span>₹ each
      </div>
    </div>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
