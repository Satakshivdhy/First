<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="border rounded-5 mx-auto mt-5 p-2 d-flex flex-column gap-2"
      id="mainContainer"
    >
      <div
        class="rounded-top-5 d-flex justify-content-end align-items-center"
        id="calculationDisplay"
      >
        <label for="text" class="px-3 fw-bold fs-3 w-100 text-end" id="text">0</label>
      </div>
      <div class="rounded-bottom-5 p-4" id="CalculatorButtonsCOntainer">
        <div id="CalculatorButtons">
          <div class="keys" onclick="calculate('AC')">AC</div>
          <div class="keys" onclick="calculate('C')">C</div>
          <div class="keys" onclick="calculate('%')">%</div>
          <div class="keys bg-warning" onclick="calculate('/')">/</div>
          <div class="keys" onclick="calculate('7')">7</div>
          <div class="keys" onclick="calculate('8')">8</div>
          <div class="keys" onclick="calculate('9')">9</div>
          <div class="keys bg-warning" onclick="calculate('*')">*</div>
          <div class="keys" onclick="calculate('4')">4</div>
          <div class="keys" onclick="calculate('5')">5</div>
          <div class="keys" onclick="calculate('6')">6</div>
          <div class="keys bg-warning" onclick="calculate('-')">-</div>
          <div class="keys" onclick="calculate('1')">1</div>
          <div class="keys" onclick="calculate('2')">2</div>
          <div class="keys" onclick="calculate('3')">3</div>
          <div class="keys bg-warning" onclick="calculate('+')">+</div>
          <div class="keys" onclick="calculate('0')">0</div>
          <div class="keys" onclick="calculate('.')">.</div>
          <div class="keys" id="equalbtn" onclick="calculate('=')">=</div>
        </div>
      </div>
    </div>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
