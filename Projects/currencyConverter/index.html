<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark">
    <header class="bg-primary text-center text-uppercase py-3 rounded-bottom-5">
      <h1>Currency Converter</h1>
    </header>
    <main class="d-flex align-items-center justify-content-center">
      <div
        class="border border-primary border-2 w-50 rounded-4 mt-5 p-5"
        id="container"
      >
        <form>
          <div class="d-flex justify-content-around align-items-center">
            <div class="h-25 w-25 d-flex flex-column gap-3">
              <img
                src=""
                alt=""
                class="object-fit-contain h-100 w-100"
                id="flag1"
              />
              <select
                name="from"
                class=""
                id="country1"
                onchange="FetchFlag1()"
              >
                <option value=""></option>
              </select>
            </div>
            <button class="btn btn-secondary" type="button" id="swapBtn">
              <i class="bi bi-arrow-left-right"></i>
            </button>
            <div class="h-25 w-25 d-flex flex-column gap-3">
              <img
                src=""
                alt=""
                class="object-fit-contain h-100 w-100"
                id="flag2"
              />
              <select name="to" class="" id="country2" onchange="FetchFlag2()">
                <option value=""></option>
              </select>
            </div>
          </div>
          <div class="d-flex flex-column align-items-center pt-4 gap-3">
            <input
              type="number"
              placeholder="Enter Amount........."
              class="form-control w-25 shadow-none text-black"
              id="inputAmount"
            />
            <button class="btn btn-primary w-25" id="convertBtn">
              Convert
            </button>
            <div class="border rounded-2 text-center pt-3 w-25 bg-light">
              <p class="fw-bold" id="errormsg">
                Converted Currency: <br />
                <span id="newAmount">#####</span>
              </p>
            </div>
          </div>
        </form>
      </div>
    </main>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="codes.js"></script>
    <script src="script.js"></script>
  </body>
</html>
