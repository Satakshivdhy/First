<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-secondary position-relative" >

    <header class="d-flex  align-items-center bg-light rounded-bottom-5 ">
      <div id="cloudLogo">
        <img
          src="./ccloudLogo.jpg"
          alt="weather"
          class="object-fit-contain h-100 w-100 rounded-bottom-5"
        />
      </div>
      <div><h1 class="b">Hey! Check The Weather Here⛅</h1></div>
      <!-- <button class="btn btn-primary"><i class="bi bi-arrow-left"></i> Back</button> -->
    </header>
    <main>
      <div
      id="weatherContainer"
      class="d-flex flex-column gap-4 p-5 m-auto mt-5 border rounded-4 shadow"
    >
      <h3 class="b">Hey! Check The Weather Here⛅</h3>

      <div class="d-flex gap-3">
        <input
          type="text"
          id="cityName"
          class="form-control"
          placeholder="Enter the city"
        />
        <button onclick="getWeather()" class="btn btn-secondary w-50">
          Get Weather
        </button>
      </div>

      <div class="text-center fw-bold row d-flex gap-4">
        <div class="col-xl-4 cards d-flex">
          <div class="w-50 h-50 rounded-circle bg-danger-subtle d-flex justify-content-center align-items-center">
            <i class="bi bi-thermometer-sun fs-2"></i>
          </div>
        <label>Temp : <span id="Temperature">__</span>ºC</label>
          </div>
        <div class="col-xl-4 cards" >
          <label>FeelsLike : <span id="feelsLike">__</span>ºC</label>
        </div>
        <div class="col-xl-4 cards">
          <label >Atmospheric Pressure : <span id="pressure">__</span>hPa</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Humidity : <span id="humidity">__</span>%</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Minimum Temperature : <span id="minTemp">__</span>ºC</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Maximum Temperature : <span id="maxTemp">__</span>ºC</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Sealevel : <span id="seaLevel">__</span>hPa</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Ground Level : <span id="groundLevel">__</span>hPa</label>
        </div>
        <div class="col-xl-4 cards">
          <label>Clouds : <span id="clouds">__</span></label>
        </div>
        <!-- <div>
           <label>Country Codee : <span id="countryCode">__</span>ºC</label>
        </div> -->
      </div>
    </div>
    </main>
    
    <script src="script.js"></script>
  </body>
</html>
