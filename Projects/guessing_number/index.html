<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body>
    
    <div class="w-50 bg-light d-flex flex-column align-items-center justify-content-center gap-3 my-5 mx-auto rounded-5 shadow border p-4">
        <h1>Guess The Number</h1>
        <p>We have selected a random number between 1-10. See if you can guess it.</p>
        <form >
        <label for="guessNumber">Enter a guess:</label>
        <input type="number" id="guessNumber" name="guessNumber" class="rounded">
        <button type="submit" class="rounded">Submit guess</button>
        </form>
    </div>

    <!-- script -->
     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>

</body>
</html>
