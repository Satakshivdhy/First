<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-dark text-light">
    <header class="bg-primary text-center text-light p-3">
      <div class="d-flex justify-content-between px-5 align-items-center" id="links">
        <h2>Pasword Manager</h2>
        <div class="d-flex gap-5">
          <a href="index.html" class="text-light text-decoration-none fs-5" 
            >Add New Password</a
          >
          <a href="showPassword.html" class="text-light text-decoration-none fs-5">Show Passwords</a>
        </div>
      </div>
    </header>
    <main>
      <div class="w-50 mx-auto rounded border p-3 mt-4">
        <form class="d-grid gap-3" id="passForm">
          <input
            type="text"
            name="siteName"
            id="siteName"
            placeholder="Enter Website Name"
            class="form-control"
          />
          <input
            type="text"
            name="userName"
            id="userName"
            placeholder="Enter Your Name"
            class="form-control"
          />
          <input
            type="text"
            name="password"
            id="password"
            placeholder="Enter your password"
            class="form-control"
          />

          <div class="d-flex justify-content-center gap-5">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="reset" class="btn btn-danger">clear</button>
          </div>
        </form>
      </div>
    </main>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
