<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body>
    <header class="p-5 mx-auto text-center bg-primary">
      <h1>Coaching Institute Registration Form</h1>
    </header>
    <main class="w-100 pt-5 d-flex justify-content-center">
        <div class="w-50 bg-light border shadow p-5 ">
      <form
        class=" bg-light d-flex flex-column justify-content-center gap-4"
      >
        <div class="d-flex flex-column gap-2">
          <label for="fullName"> Name:</label>
          <input
            type="text"
            name="fullName"
            id="fullName"
            placeholder="Enter your Full name"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="email">Email Adress:</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter your email address"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="mobNumber">Moile Number:</label>
          <input
            type="number"
            name="number"
            id="number"
            placeholder="Enter your mobile number"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="DOB">Date Of Birth:</label>
          <input
            type="date"
            name="DOB"
            id="DOB"
            placeholder="Enter your Birth Date"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label>Select gender:</label>
          <div class="d-flex gap-3">
          <input type="radio" name="gender" id="Female" /> Female
          <input type="radio" name="gender" id="Male" /> Male
          </div>
        </div>
        <div class="d-flex flex-column gap-2">
            <label for="qualification">Enter your highest qualification</label>
          <select name="qualification" id="qualification" class="form-select">
            <option value="select">Select</option>
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="graduate">Graduate</option>
            <option value="postgraduate">Postgraduate</option>
          </select>
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="grade">Percentage/Grade in Last Qualification:</label>
          <input type="text" name="grade" id="grade" class="form-control" />
        </div>
        <div class="d-flex flex-column gap-2">
            <label for="course">Preferred Course:</label>
          <select name="course" id="course" class="form-select">
            <option value="select">Select</option>
            <option value="IIT-JEE">IIT-JEE</option>
            <option value="Banking Exams">Banking Exams</option>
            <option value="UPSC">UPSC</option>
          </select>
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="batchtiming">Select batch Timing</label>
          <div class="d-flex gap-3">
          <input
            type="checkbox"
            name="batchtiming"
            id="batchtiming"
            value="batchtiming"
          />Morning
          <input
            type="checkbox"
            name="batchtiming"
            id="batchtiming"
            value="batchtiming"
          />Afternoon
          <input
            type="checkbox"
            name="batchtiming"
            id="batchtiming"
            value="batchtiming"
          />Evening
          <input
            type="checkbox"
            name="batchtiming"
            id="batchtiming"
            value="batchtiming"
          />Weekend
          </div>
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="residentialAddress">Full Address:</label>
          <textarea
            id="residentialAddress"
            name="residentialAddress"
            placeholder="Enter your full Address"
            class="form-control"
          ></textarea>
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="city">City:</label>
          <input
            type="text"
            name="city"
            id="city"
            placeholder="Enter your city name"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="pinCode">Pin Code:</label>
          <input
            type="number"
            name="pinCode"
            id="pinCode"
            placeholder="Enter Pin Code"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="GuardianFullName">Guardian's Full Name:</label>
          <input
            type="text"
            name="GuardianFullName"
            id="GuardianFullName"
            placeholder="Enter your Father's Name"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="GuardianContact">Guardian's Contact Number:</label>
          <input
            type="number"
            name="GuardianContact"
            id="GuardianContact"
            placeholder="Enter your Father's mobile Number"
            class="form-control"
          />
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="addInfo">How did you hear about us?</label>
          <select name="addInfo" id="addInfo" class="form-select">
            <option value="select">Select</option>
            <option value="Friends">Friends</option>
            <option value="Online Ad">Online Ad</option>
            <option value="Newspaper">Newspaper</option>
            <option value="Social Media">Social Media</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="d-flex flex-column gap-2">
          <label for="SpecialInfo">Type here for more information </label>
          <textarea
            name="SpecialInfo"
            id="SpecialInfo"
            placeholder="Optional"
            class=" form-control"
          ></textarea>
        </div>
        <div class="d-flex justify-content-between"> 
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Clear</button>
        </div>
      </form>
      </div>
    </main>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
