<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="bg-primary p-3 text-center">
        <h1 class="text-light">Coaching Institute Registration Form</h1>
      </div>
    </header>
    <main>
      <div class="container my-4 bg-light border rounded shadow p-5">
        <form id="registrationFrom">
          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="fullName" class="form-label fw-bold"> Name:</label>
              <input
                type="text"
                name="fullName"
                id="fullName"
                placeholder="Enter your Full name"
                class="form-control"
              />
              <span class="text-danger small" id="fullNameError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="email" class="form-label fw-bold"
                >Email Adress:</label
              >
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Enter your email address"
                class="form-control"
              />
              <span class="text-danger small" id="emailError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="mobNumber" class="form-label fw-bold"
                >Moile Number:</label
              >
              <input
                type="number"
                name="number"
                id="number"
                placeholder="Enter your mobile number"
                class="form-control"
              />
              <span class="text-danger small" id="phoneError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="DOB" class="form-label fw-bold">Date Of Birth:</label>
              <input
                type="date"
                name="DOB"
                id="DOB"
                placeholder="Enter your Birth Date"
                class="form-control"
              />
              <span class="text-danger small" id="dobError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5">
              <label for="gender" class="form-label fw-bold"
                >Select gender:</label
              >
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="Female"
                  value="Female"
                  class="form-switch"
                />
                <span> Female</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="Male"
                  vlaue="Male"
                  class="form-switch"
                /><span> Male</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="others"
                  value="others"
                  class="form-switch"
                />
                <span>Others</span>
              </div>
              <span class="text-danger small" id="dobError"></span> 
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="qualification"  class="form-label fw-bold"
                >Enter your highest qualification</label
              >
              <select
                name="qualification"
                id="qualification"
                class="form-select"
              >
                <option value="select">Select Qualification</option>
                <option value="10th">10th</option>
                <option value="12th">12th</option>
                <option value="graduate">Graduate</option>
                <option value="postgraduate">Postgraduate</option>
              </select>
              <span class="text-danger small" id="qualificationError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="grade" class="form-label fw-bold">Percentage/Grade in Last Qualification:</label>
              <input type="text" name="grade" id="grade" class="form-control"  placeholder="90% or A-F"/>
              <span class="text-danger small" id="marksError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="course" class="form-label fw-bold">Preferred Course:</label>
              <select name="course" id="course" class="form-select">
                <option value="select">Select</option>
                <option value="IIT-JEE">IIT-JEE</option>
                <option value="NEET">NEET</option>
                <option value="Banking Exams">Banking Exams</option>
                <option value="ca/cs">CA/CS</option>
                <option value="UPSC">UPSC</option>
              </select>
               <span class="text-danger small" id="courseError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5 align-items-center">
              <label for="batchtiming" class="form-label fw-bold">Select batch Timings</label>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="batchtiming"
                  id="batchtiming"
                  value="morning"
                />
                <span>Morning</span>
                <input
                  type="checkbox"
                  name="batchtiming"
                  id="batchtiming"
                  value="afternoon"
                />
                <span>Afternoon</span>
                <input
                  type="checkbox"
                  name="batchtiming"
                  id="batchtiming"
                  value="evening"
                />
                <span>Evening</span>
                <input
                  type="checkbox"
                  name="batchtiming"
                  id="batchtiming"
                  value="weekend"
                />
                <span>Weekend</span>
              </div>
              <span class="text-danger small" id="timingsError"></span>
            </div>
          </section>
          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="residentialAddress" class="form-label fw-bold">Full Address:</label>
              <textarea
                id="residentialAddress"
                name="residentialAddress"
                placeholder="Enter your full Address"
                class="form-control"
              ></textarea>
              <span class="text-danger small" id="addressError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="city" class="form-label fw-bold">City:</label>
              <input
                type="text"
                name="city"
                id="city"
                placeholder="Enter your city name"
                class="form-control"
              />
               <span class="text-danger small" id="cityError"></span>
            </div>
            <div  class="p-2 mt-2">
              <label for="pinCode" class="form-label fw-bold">Pin Code:</label>
              <input
                type="text"
                name="pinCode"
                id="pinCode"
                placeholder="Enter Pin Code"
                class="form-control"
              />
                <span class="text-danger small" id="pinError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="GuardianFullName" class="form-label fw-bold">Guardian's Full Name:</label>
              <input
                type="text"
                name="GuardianFullName"
                id="GuardianFullName"
                placeholder="Enter your Father's Name"
                class="form-control"
              />
              <span class="text-danger small" id="guardianNameError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="GuardianContact" class="form-label fw-bold">Guardian's Contact Number:</label>
              <input
                type="number"
                name="GuardianContact"
                id="GuardianContact"
                placeholder="Enter your Father's mobile Number"
                class="form-control"
              />
              <span class="text-danger small" id="guardiancontactError"></span>
            </div>
          </section>
          
          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="addInfo" class="form-label fw-bold">How did you hear about us?</label>
              <select name="addInfo" id="addInfo" class="form-select">
                <option value="select">Select</option>
                <option value="Friends">Friends</option>
                <option value="Online Ad">Online Ad</option>
                <option value="Newspaper">Newspaper</option>
                <option value="Social Media">Social Media</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="p-2 mt-2">
              <label for="SpecialInfo" class="form-label fw-bold">Type here for more information </label>
              <textarea
                name="SpecialInfo"
                id="SpecialInfo"
                placeholder="Optional"
                class="form-control"
              ></textarea>
            </div>
          </section>
          
            <div class="d-flex justify-content-between">
              <button type="reset" class="btn btn-secondary">Clear</button>
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
      </div>
    </main>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
